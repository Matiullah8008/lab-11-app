<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Deployment Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 0.5rem;
        }
        p {
            color: #5f6368;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .status-badge {
            display: inline-block;
            background-color: #34a853;
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }
        .task-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #1a73e8;
        }
        button {
            padding: 10px 15px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #1557b0;
        }
        ul {
            list-style: none;
            padding: 0;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        li {
            background: #f8f9fa;
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:last-child {
            border-bottom: none;
        }
        .delete-btn {
            color: #d93025;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">Status: Online</div>
        <h1>Deployment Test</h1>
        <p>Simple task manager to test AWS deployment.</p>
        
        <div class="task-input-group">
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList">
            <!-- Tasks will appear here -->
        </ul>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (taskText === '') return;

            const ul = document.getElementById('taskList');
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskText}</span>
                <span class="delete-btn" onclick="this.parentElement.remove()">X</span>
            `;
            ul.appendChild(li);
            input.value = '';
        }

        // Allow 'Enter' key to add task
        document.getElementById('taskInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
    </script>
</body>
</html>
